<svg viewBox="0 0 260 56" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Genesis360">
  <!-- Outer lime green circle -->
  <circle cx="28" cy="28" r="24" fill="#9DC43A"/>
  <!-- White offset inner circle — creates the open-C / ring effect -->
  <circle cx="37" cy="17" r="14" fill="white"/>
  <!-- Small dark green bean (upper crescent area) -->
  <path d="M14,10 C6,13 6,23 14,25 C22,23 22,13 14,10Z" fill="#1E4535"/>
  <!-- Large dark green bean (lower crescent area) -->
  <path d="M13,27 C5,31 5,43 13,46 C21,43 21,31 13,27Z" fill="#1E4535"/>
  <!-- Genesis360 text -->
  <text x="64" y="38"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="27"
        font-weight="700"
        fill="#1E4535"
        letter-spacing="-0.5">Genesis360</text>
</svg>
